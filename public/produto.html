<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/"><img id="logo" alt=""><span id="storeName">Loja Toicin</span></a>
    <nav><a href="/catalogo.html">Catalogo</a><a href="/faq.html">FAQ</a></nav>
  </header>
  <main class="product-page">
    <section class="gallery"><img id="mainImage" class="main-image" alt=""><div id="thumbs" class="thumbs"></div></section>
    <section class="product-info">
      <p class="eyebrow" id="category"></p>
      <h1 id="productName"></h1>
      <strong id="price" class="price"></strong>
      <p id="shortDescription"></p>
      <p id="fullDescription"></p>
      <h2>Especificacoes</h2>
      <dl id="specs" class="specs"></dl>
    </section>
    <section class="section wide"><h2>Perguntas frequentes</h2><div id="faqs" class="faq-list"></div></section>
  </main>
  <a id="fixedWhatsapp" class="fixed-whatsapp" target="_blank">Tenho interesse</a>
  <script src="/js/produto.js"></script>
</body>
</html>
