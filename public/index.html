<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loja Toicin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/"><img id="logo" alt=""><span id="storeName">Loja Toicin</span></a>
    <nav><a href="/catalogo.html">Catalogo</a><a href="/faq.html">FAQ</a><a id="instagram" href="#" target="_blank">Instagram</a></nav>
  </header>
  <main>
    <section class="hero">
      <div>
        <p class="eyebrow" id="city"></p>
        <h1 id="headline">Mobilidade eletrica para sua rotina</h1>
        <p id="description"></p>
        <div class="actions"><a class="btn" id="whatsappBtn" target="_blank">Chamar no WhatsApp</a><a class="btn ghost" href="/catalogo.html">Ver catalogo</a></div>
      </div>
    </section>
    <section class="section">
      <div class="section-title"><h2>Produtos em destaque</h2><a href="/catalogo.html">Ver todos</a></div>
      <div class="grid products" id="featuredProducts"></div>
    </section>
    <section class="section">
      <h2>Categorias</h2>
      <div class="category-grid" id="categories"></div>
    </section>
    <section class="section faq-band">
      <h2>Perguntas frequentes</h2>
      <div id="faqs" class="faq-list"></div>
    </section>
  </main>
  <footer><span id="footerStore"></span> - Veiculos eletricos</footer>
  <script src="/js/main.js"></script>
</body>
</html>
